services:
  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    image: ecommerce-backend
    container_name: app
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - .env

volumes:
  postgres_data: